name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you expected vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run '...'
        2. See error '...'
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output or logs
      description: Paste any relevant error messages or log output.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop screenshots or terminal output that shows the problem.
      placeholder: Drag and drop images here, or paste terminal screenshots.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Fedora/RHEL)
        - Linux (Ubuntu/Debian)
        - Linux (Arch)
        - Linux (other)
        - macOS
        - Windows (WSL)
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g., 3.11.9"

  - type: input
    id: claude-code
    attributes:
      label: Claude Code version
      placeholder: "e.g., 2.1.89"
