name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI tests
        run: python tests/ci_test.py

      - name: Test installer prereq checks (Linux/macOS only)
        if: runner.os != 'Windows'
        run: |
          # Test that install.sh runs prereq checks without errors
          # We patch it to skip clone/setup (already in the repo)
          bash -c '
            set +e
            source <(head -115 install.sh)
            echo "Prereq check exit: $ERRORS errors"
            exit $ERRORS
          '
