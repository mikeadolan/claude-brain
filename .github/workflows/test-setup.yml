name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI tests
        run: python tests/ci_test.py

      - name: Test installer syntax and prereq logic (Linux/macOS only)
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
          echo "install.sh syntax check: PASS"
          # Verify prereq check functions work by running key checks directly
          python3 -c "import sys; assert sys.version_info >= (3,10), 'Python too old'; print('Python version check: PASS')"
          pip3 --version > /dev/null 2>&1 && echo "pip3 check: PASS"
          git --version > /dev/null 2>&1 && echo "git check: PASS"
