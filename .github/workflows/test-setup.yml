name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI tests
        run: python tests/ci_test.py

      - name: Test installer prereq checks (Linux/macOS only)
        if: runner.os != 'Windows'
        run: |
          # Test that install.sh runs prereq checks without errors
          # Claude Code is not installed on CI runners, so we expect 1 error (Claude Code missing)
          # Python, pip3, and git must all pass
          bash -c '
            set +e
            source <(head -115 install.sh)
            echo "Prereq check exit: $ERRORS errors"
            if [ $ERRORS -le 1 ]; then
              echo "PASS (Claude Code not expected on CI runners)"
              exit 0
            else
              echo "FAIL (unexpected missing prerequisites)"
              exit 1
            fi
          '
